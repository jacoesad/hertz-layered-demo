server:
  addr: ":8889"

logger:
  level: info
  file_path: logs/app.log
  max_size_mb: 100

database:
  main:
    driver: sqlite3
    dsn: data/hz-server.db
  starrocks:
    driver: sqlite3
    dsn: data/starrocks.db

signature:
  enabled: true
  secret: demo-secret
  header: X-Signature

downstream:
  task_runner:
    endpoint: http://127.0.0.1:9000
    timeout_ms: 3000
